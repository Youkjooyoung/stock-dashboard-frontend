name: Frontend Auto Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to EC2 (jyyouk.shop)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build
        env:
          VITE_API_BASE_URL: https://api.jyyouk.shop
          VITE_PORTONE_IMP_KEY: ${{ secrets.VITE_PORTONE_IMP_KEY }}
          VITE_WS_URL: ${{ secrets.VITE_WS_URL }}

      - name: Copy dist to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_FRONTEND_HOST }}
          username: ${{ secrets.EC2_FRONTEND_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: "dist/*"
          target: "~/stock-dashboard-frontend-dist"
          strip_components: 1

      - name: Swap dist and reload nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_FRONTEND_HOST }}
          username: ${{ secrets.EC2_FRONTEND_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -e
            echo "[1/3] 기존 정적 파일 백업"
            sudo rm -rf /var/www/stock-dashboard.bak
            sudo mv /var/www/stock-dashboard /var/www/stock-dashboard.bak || true
            sudo mkdir -p /var/www/stock-dashboard
            echo "[2/3] 새 빌드 반영"
            sudo cp -r ~/stock-dashboard-frontend-dist/* /var/www/stock-dashboard/
            echo "[3/3] nginx reload"
            sudo nginx -t
            sudo systemctl reload nginx

      - name: Notify success
        if: success()
        run: echo "✅ 프론트엔드 운영 배포 완료 — $(date -u +'%Y-%m-%dT%H:%M:%SZ')"

      - name: Notify failure
        if: failure()
        run: |
          echo "❌ 프론트엔드 운영 배포 실패 — SCP/SSH/nginx 설정 확인 필요"
          exit 1
